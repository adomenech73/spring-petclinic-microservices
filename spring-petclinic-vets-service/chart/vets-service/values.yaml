replicaCount: 1

image:
  repository: localhost:5000/spring-petclinic-api-gateway
  tag: latest
  pullPolicy: IfNotPresent

resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
  requests:
    cpu: "250m"
    memory: "256Mi"

livenessProbe:
  enabled: true
  path: /
  port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 3

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

serviceAccount:
  automountToken: true
