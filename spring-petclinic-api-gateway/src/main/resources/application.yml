spring:
  application:
    name: api-gateway
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888/}
  cloud:
    gateway:
      routes:
        - id: vets-service
          uri: lb://vets-service
          predicates:
            - Path=/api/vet/**
          filters:
            - StripPrefix=2
        - id: visits-service
          uri: lb://visits-service
          predicates:
            - Path=/api/visit/**
          filters:
            - StripPrefix=2
        - id: customers-service
          uri: lb://customers-service
          predicates:
            - Path=/api/customer/**
          filters:
            - StripPrefix=2
management:
  otlp:
    metrics:
      export:
        enabled: false

---
spring:
  config:
    activate:
      on-profile: kubernetes
    import: configserver:http://config-server:8888
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  otlp:
    metrics:
      enabled: true
      export:
        url: http://my-collector-collector.observability.svc.cluster.local:4318/v1/metrics
        step: 10s
    tracing:
      endpoint: http://my-collector-collector.observability.svc.cluster.local:4318/v1/traces
      export:
        step: 10s # Export interval set to 10 seconds
  tracing:
    sampling:
      probability: 1.0
