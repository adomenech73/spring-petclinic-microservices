replicaCount: 1

image:
  repository: localhost:5000/spring-petclinic-admin-server
  tag: latest
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""
  annotations: {}
  automountToken: true

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
  requests:
    cpu: "250m"
    memory: "256Mi"

probes:
  liveness:
    path: /actuator/health
    timeoutSeconds: 5
    periodSeconds: 10
    initialDelaySeconds: 15
    failureThreshold: 3
  readiness:
    path: /actuator/health
    timeoutSeconds: 5
    periodSeconds: 10
    initialDelaySeconds: 5
    failureThreshold: 3

ingress:
  enabled: false
  annotations: {}
  host: admin-server.local